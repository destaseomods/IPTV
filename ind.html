<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Generator - Dashim</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #0f0f0f; color: white; }
        button { padding: 15px 40px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button:hover { background: #218838; }
        #status { margin: 25px; font-size: 18px; min-height: 30px; }
    </style>
</head>
<body>
    <h1>🎞️ Dashim Playlist Generator</h1>
    <button onclick="generatePlaylist()">🚀 Generate & Download M3U</button>
    <div id="status"></div>

    <script>
        const API_URL = "https://dashim.biz.id/api/android/api_get_playlists.php";

        // CORS Proxy (coba ganti kalau satu tidak works)
        const PROXY = "https://corsproxy.io/?";

        const headers = {
            "Device-ID": "aedab7ac79134d3e",
            "Vip-Status": "1",
            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODA0ODU5MjUsImRhdGEiOiJzYW50dl9hcHAifQ.vQwaOR6Fx9q0UGkMNsaSxVWdQ8Gz_f_lwsH7G_C9q1s",
            "X-Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODA0ODU5MjUsImRhdGEiOiJzYW50dl9hcHAifQ.vQwaOR6Fx9q0UGkMNsaSxVWdQ8Gz_f_lwsH7G_C9q1s",
            "Device-Fingerprint": "22111317PG|moonstone|POCO/moonstone_p_id/moonstone:14/UKQ1.231003.002/V816.0.21.0.UMPIDXM:user/release-keys",
            "App-Build": "26",
            "Device-Name": "Xiaomi 22111317PG",
            "User-Agent": "okhttp/4.12.0"
        };

        async function generatePlaylist() {
            const status = document.getElementById('status');
            status.innerHTML = "⏳ Sedang mengambil playlist...";

            try {
                const response = await fetch(PROXY + encodeURIComponent(API_URL), {
                    method: "GET",
                    headers: headers
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                let m3u = "#EXTM3U\n";
                const channels = data.playlists || data.channels || (Array.isArray(data) ? data : []);

                if (channels.length === 0) {
                    throw new Error("Tidak ada channel ditemukan di response");
                }

                channels.forEach(item => {
                    const title = item.name || item.title || "Untitled";
                    const stream = item.url || item.stream_url || item.link || "";
                    const logo = item.logo || item.image || "";
                    const group = item.group || item.category || "Live";

                    if (stream) {
                        m3u += `#EXTINF:-1 group-title="\( {group}" tvg-logo=" \){logo}",\( {title}\n \){stream}\n`;
                    }
                });

                // Download
                const blob = new Blob([m3u], { type: 'text/plain' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `dashim_playlist_${new Date().toISOString().slice(0,19).replace(/[:T]/g, '-')}.m3u`;
                link.click();

                status.innerHTML = `✅ Sukses! ${channels.length} channel telah didownload.`;

            } catch (err) {
                console.error(err);
                status.innerHTML = `❌ Gagal: ${err.message}<br><br>Coba refresh atau ganti proxy.`;
            }
        }
    </script>
</body>
</html>
